<div class="progress-bar-container" [class.visible]="isLoading">
  <div class="progress-bar"></div>
</div>

<nav class="navbar" [class.scrolled]="scrolled">
  <div class="logo-container">
    <img src="nexconnect_logo_single_white.png" alt="NexConnect" class="logo">
  </div>
  <button class="mobile-menu-btn" (click)="toggleMenu()">
    <span class="material-icons">{{ menuOpen ? 'close' : 'menu' }}</span>
  </button>

  <div class="nav-links" [class.open]="menuOpen">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">Home</a>
    <a routerLink="/products" routerLinkActive="active" (click)="closeMenu()">Products</a>
    <a routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">Contact</a>
    <a routerLink="/admin/login" class="admin-link" (click)="closeMenu()">Admin</a>
  </div>
</nav>

<main class="content-container">
  <div [@routeTransition]="getRouteState(outlet)" class="route-wrap">
    <router-outlet #outlet="outlet"></router-outlet>
  </div>
</main>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-logo-row">
      <img src="nexconnect_logo_single_white.png" alt="NexConnect" class="footer-logo">
    </div>
    <div class="footer-links-row">
      <div class="footer-group">
        <a routerLink="/contact">Contact</a>
        <a href="#">Press</a>
      </div>
      <div class="footer-group">
        <a href="#">Privacy &amp; Terms</a>
        <a href="#">Careers</a>
      </div>
      <div class="footer-group">
        <a href="#">LinkedIn</a>
        <a href="#">GitHub</a>
        <a href="#">YouTube</a>
      </div>
    </div>
  </div>
  <div class="footer-bottom">
    <span>NexConnect Technologies, a software company. All rights reserved.</span>
  </div>
</footer>
