<div class="ag-login-container">
    <div class="ag-login-box reveal-up">

        <div class="ag-login-header">
            <h1 class="ag-massive-title">SYSTEM<br>ACCESS.</h1>
            <p class="ag-login-sub">Authorized personnel authentication required.</p>
        </div>

        <form class="ag-login-form" (ngSubmit)="onLogin()">
            <div class="ag-field">
                <label for="admin_email">IDENTITY</label>
                <input class="ag-brutalist-input" id="admin_email" type="email" [(ngModel)]="email" name="email"
                    placeholder="mail@nex-connect.in" required autocomplete="off">
            </div>

            <div class="ag-field">
                <label for="admin_password">CREDENTIAL</label>
                <input class="ag-brutalist-input" id="admin_password" type="password" [(ngModel)]="password"
                    name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <div *ngIf="error" class="ag-login-error">{{ error }}</div>

            <button type="submit" class="btn-primary ag-submit-btn" [disabled]="loading">
                <span *ngIf="!loading">AUTHENTICATE</span>
                <span *ngIf="loading">VERIFYING...</span>
            </button>
        </form>

        <div class="ag-login-footer">
            <a routerLink="/" class="ag-back-link">Return to Public Root</a>
        </div>
    </div>
</div>
