<div class="saas-login-container">

    <!-- Abstract Background -->
    <div class="login-bg-shape bg-shape-1"></div>
    <div class="login-bg-shape bg-shape-2"></div>

    <div class="auth-card surface-card reveal-up">

        <div class="auth-header text-center">
            <div class="auth-icon text-blue">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
            <h2>Admin Portal</h2>
            <p class="text-secondary mt-xs">Sign in to manage infrastructure</p>
        </div>

        <form class="auth-form mt-lg" (ngSubmit)="onLogin()">
            <div class="form-group">
                <label for="admin_email">Email Address</label>
                <input class="form-input" id="admin_email" type="email" [(ngModel)]="email" name="email"
                    placeholder="admin@nex-connect.in" required autocomplete="off">
            </div>

            <div class="form-group">
                <label for="admin_password">Password</label>
                <input class="form-input" id="admin_password" type="password" [(ngModel)]="password" name="password"
                    placeholder="••••••••" required autocomplete="current-password">
            </div>

            <div *ngIf="error" class="auth-error-msg mt-sm">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                {{ error }}
            </div>

            <button type="submit" class="btn-primary w-full shadow-md mt-md" [disabled]="loading">
                <span *ngIf="!loading">Sign In</span>
                <span *ngIf="loading" class="flex-center gap-sm">
                    <svg class="spinner" viewBox="0 0 50 50" width="16" height="16">
                        <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
                    </svg>
                    Verifying...
                </span>
            </button>
        </form>

        <div class="auth-footer text-center mt-lg">
            <a routerLink="/" class="back-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to Public Site
            </a>
        </div>
    </div>
</div>
