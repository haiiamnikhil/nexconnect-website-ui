<div class="x-login-container">

    <!-- Left: Identity -->
    <div class="x-login-brand">
        <div class="x-login-brand-inner">
            <div class="x-brand-headline">NexConnect</div>
            <p class="x-brand-sub">The Software Factory.<br>Internal Operations Portal.</p>

            <div class="x-security-badges">
                <div class="x-sec-badge">
                    <span class="x-sec-dot green"></span>
                    Systems Operational
                </div>
                <div class="x-sec-badge">
                    <span class="x-sec-dot"></span>
                    256-bit AES Encrypted
                </div>
                <div class="x-sec-badge">
                    <span class="x-sec-dot"></span>
                    IP Logged
                </div>
            </div>
        </div>
        <div class="x-brand-glow-1"></div>
        <div class="x-brand-glow-2"></div>
    </div>

    <!-- Right: Form -->
    <div class="x-login-form-panel">
        <div class="x-login-form-inner">
            <h1 class="x-login-title">Admin<br>Sign In.</h1>
            <p class="x-login-sub">Restricted access. Authorized personnel only.</p>

            <form class="x-login-form" (ngSubmit)="onLogin()">
                <div class="x-field">
                    <label class="x-label" for="admin_email">Email</label>
                    <input class="x-input" id="admin_email" type="email" [(ngModel)]="email" name="email"
                        placeholder="admin@nexconnect.io" required>
                </div>
                <div class="x-field">
                    <label class="x-label" for="admin_password">Password</label>
                    <input class="x-input" id="admin_password" type="password" [(ngModel)]="password" name="password"
                        placeholder="••••••••••" required>
                </div>

                <div *ngIf="error" class="x-login-error">{{ error }}</div>

                <button type="submit" class="x-btn x-login-btn" [disabled]="loading">
                    <span *ngIf="!loading">Sign In →</span>
                    <span *ngIf="loading">Authenticating...</span>
                </button>
            </form>

            <div class="x-login-footer">
                <a routerLink="/" class="x-back-link">← Public Site</a>
            </div>
        </div>
    </div>

</div>
